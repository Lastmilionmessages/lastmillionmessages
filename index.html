<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Last Million Messages</title>
</head>
<body style="background:black;color:white;text-align:center;padding:50px;font-family:Arial;">

  <h1>THE LAST MILLION MESSAGES</h1>
  <p>If the world ended tomorrow, what would you say?</p>

  <textarea
    id="message"
    style="width:320px;height:120px;"
    placeholder="Write your final message..."
  ></textarea>

  <br><br>

  <button id="saveBtn" style="padding:10px 20px;font-size:16px;">
    Save my message
  </button>
<div id="messages" style="margin-top:40px;"></div>
  <p id="status" style="margin-top:20px;white-space:pre-wrap;"></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://fbfjptggmqzfvtijvdry.supabase.co';
    const supabaseKey = 'sb_publishable_0z7GiOROGpKo3XIIfMmVew_QhoQqKDV';

    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    const saveBtn = document.getElementById('saveBtn');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    if (!window.supabase) {
      setStatus('Greška: Supabase library se nije učitao.');
    }

    let client = null;

    try {
      client = window.supabase.createClient(supabaseUrl, supabaseKey);
      setStatus('App loaded.');
    } catch (e) {
      setStatus('Init error: ' + e.message);
    }

    saveBtn.addEventListener('click', async () => {
      const message = messageEl.value.trim();

      if (!message) {
        setStatus('Napiši poruku prvo.');
        return;
      }

      if (!client) {
        setStatus('Supabase client nije napravljen.');
        return;
      }

      setStatus('Saving...');

      try {
        const { data, error } = await client
          .from('messages')
          .insert([{ message: message }])
          .select();

        if (error) {
          setStatus('Insert error:\n' + JSON.stringify(error, null, 2));
          return;
        }

        setStatus('Message saved!\n' + JSON.stringify(data, null, 2));
        messageEl.value = '';
        loadMessages();
      } catch (err) {
        setStatus('Unexpected error:\n' + err.message);
      }
    });async function loadMessages() {
  const { data, error } = await client
    .from('messages')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(10);

  if (error) {
    setStatus('Error loading messages');
    return;
  }

  const container = document.getElementById('messages');
  container.innerHTML = '';

  data.forEach(msg => {
    const div = document.createElement('div');
    div.style.margin = '10px';
    div.innerHTML = `
      <strong>#${msg.id}</strong><br>
      ${msg.message}
    `;
    container.appendChild(div);
  });
}
  </script>
</body>
</html>
