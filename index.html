<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Last Million Messages</title>
</head>
<body style="background:black;color:white;text-align:center;padding:50px;font-family:Arial;">

  <h1>THE LAST MILLION MESSAGES</h1>
  <p>If the world ended tomorrow, what would you say?</p>

  <textarea
    id="message"
    style="width:320px;height:120px;"
    placeholder="Write your final message..."
  ></textarea>

  <br><br>

  <button id="saveBtn" style="padding:10px 20px;font-size:16px;">
    Save my message
  </button>

  <p id="status" style="margin-top:20px;"></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://fbjptggmqzftvijvdry.supabase.co';
    const supabaseKey = 'sb_publishable_0z7GiOROGpKo3XIIfMmVew_QhoQqKDV';

    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    const saveBtn = document.getElementById('saveBtn');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    let client;

    try {
      client = window.supabase.createClient(supabaseUrl, supabaseKey);
      setStatus('App loaded.');
    } catch (e) {
      console.error('Supabase init error:', e);
      setStatus('Greška pri učitavanju aplikacije.');
    }

    saveBtn.addEventListener('click', async () => {
      const message = messageEl.value.trim();

      if (!message) {
        setStatus('Napiši poruku prvo.');
        return;
      }

      if (!client) {
        setStatus('Supabase nije učitan.');
        return;
      }

      setStatus('Saving...');

      try {
        const { data, error } = await client
          .from('messages')
          .insert([{ message: message }]);

        if (error) {
          console.error('Insert error:', error);
          setStatus('Error saving message. Pogledaj console.');
          return;
        }

        setStatus('Message saved!');
        messageEl.value = '';
      } catch (err) {
        console.error('Unexpected error:', err);
        setStatus('Neočekivana greška. Pogledaj console.');
      }
    });
  </script>
</body>
</html>
