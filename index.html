<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Last Million Messages</title>
</head>
<body style="background:black;color:white;text-align:center;padding:50px;font-family:Arial;">

  <h1>THE LAST MILLION MESSAGES</h1>
  <p><strong>If the world ended tomorrow, what would you say?</strong></p>

  <textarea
    id="message"
    style="width:320px;height:120px;"
    placeholder="Write your final message..."
  ></textarea>

  <br><br>

  <button id="saveBtn" style="padding:10px 20px;font-size:16px;">
    Save my message
  </button>

  <br><br>

  <button id="randomBtn" style="padding:10px 20px;font-size:16px;">
    Show random message
  </button>

  <p id="status" style="margin-top:20px;white-space:pre-wrap;"></p>
  <p id="counter" style="margin-top:20px;font-size:18px;"></p>

  <div id="messages" style="margin-top:40px;max-width:600px;margin-left:auto;margin-right:auto;"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://fbfjptggmqzfvtijvdry.supabase.co';
    const supabaseKey = 'sb_publishable_0z7GiOROGpKo3XIIfMmVew_QhoQqKDV';

    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    const saveBtn = document.getElementById('saveBtn');
    const randomBtn = document.getElementById('randomBtn');
    const messagesEl = document.getElementById('messages');
    const counterEl = document.getElementById('counter');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    let client = null;

    try {
      client = window.supabase.createClient(supabaseUrl, supabaseKey);
      setStatus('App loaded.');
    } catch (e) {
      setStatus('Init error: ' + e.message);
    }

    async function loadMessages() {
      if (!client) {
        setStatus('Supabase client nije napravljen.');
        return;
      }

      const { data, error } = await client
        .from('messages')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(10);

      if (error) {
        setStatus('Load error: ' + error.message);
        return;
      }

      messagesEl.innerHTML = '<h2 style="margin-bottom:20px;">Latest messages</h2>';

      if (!data || data.length === 0) {
        messagesEl.innerHTML += '<p>No messages yet.</p>';
        return;
      }

      data.forEach((msg) => {
        const card = document.createElement('div');
        card.style.border = '1px solid #333';
        card.style.padding = '16px';
        card.style.marginBottom = '12px';
        card.style.borderRadius = '8px';
        card.style.textAlign = 'left';
        card.style.background = '#111';

        const safeMessage = escapeHtml(msg.message);

        card.innerHTML = `
          <div style="font-size:14px;color:#aaa;margin-bottom:8px;">Message #${msg.id}</div>
          <div style="font-size:18px;margin-bottom:12px;">"${safeMessage}"</div>
          <button class="share-btn" data-id="${msg.id}" data-message="${safeMessage}" style="padding:8px 14px;font-size:14px;">
            Copy & Share
          </button>
        `;

        messagesEl.appendChild(card);
      });

      document.querySelectorAll('.share-btn').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          const text = btn.getAttribute('data-message')
            .replace(/&quot;/g, '"')
            .replace(/&#039;/g, "'")
            .replace(/&lt;/g, '<')
            .replace(/&gt;/g, '>')
            .replace(/&amp;/g, '&');

          const shareText = `My message before the world ends (#${id}): "${text}" - lastmillionmessages.com`;

          try {
            await navigator.clipboard.writeText(shareText);
            alert('Copied! Share it 🔥');
          } catch (err) {
            alert(shareText);
          }
        });
      });
    }

    async function loadCounter() {
      const { count, error } = await client
        .from('messages')
        .select('*', { count: 'exact', head: true });

      if (error) {
        setStatus('Counter error: ' + error.message);
        return;
      }

      counterEl.textContent = count + ' / 1,000,000 messages';
    }

    async function showRandomMessage() {
      const { data, error } = await client
        .from('messages')
        .select('*');

      if (error) {
        setStatus('Random error: ' + error.message);
        return;
      }

      if (!data || data.length === 0) {
        alert('No messages yet.');
        return;
      }

      const random = data[Math.floor(Math.random() * data.length)];
      alert('Message #' + random.id + ':\n\n' + random.message);
    }

    saveBtn.addEventListener('click', async () => {
      const message = messageEl.value.trim();

      if (!message) {
        setStatus('Napiši poruku prvo.');
        return;
      }

      if (!client) {
        setStatus('Supabase client nije napravljen.');
        return;
      }

      setStatus('Saving...');

      try {
        const { error } = await client
          .from('messages')
          .insert([{ message: message }]);

        if (error) {
          setStatus('Insert error: ' + error.message);
          return;
        }

        setStatus('Message saved!');
        messageEl.value = '';
        await loadMessages();
        await loadCounter();
      } catch (err) {
        setStatus('Unexpected error: ' + err.message);
      }
    });

    randomBtn.addEventListener('click', showRandomMessage);

    loadMessages();
    loadCounter();
  </script>
</body>
</html>
