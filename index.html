<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Last Million Messages</title>
</head>
<body style="margin:0;background:#0a0a0a;color:white;font-family:system-ui, Arial, sans-serif;">

  <div style="max-width:760px;margin:0 auto;padding:60px 20px 80px 20px;">

    <div style="text-align:center;margin-bottom:40px;">
      <div style="font-size:13px;letter-spacing:2px;color:#888;text-transform:uppercase;margin-bottom:14px;">
        A digital archive of humanity
      </div>

      <h1 style="font-size:52px;line-height:1.05;margin:0 0 18px 0;">
        The Last Million Messages
      </h1>

      <p style="font-size:22px;line-height:1.4;color:#d6d6d6;max-width:680px;margin:0 auto 14px auto;">
        If the world ended tomorrow, what would you say?
      </p>

      <p style="font-size:16px;color:#9a9a9a;max-width:620px;margin:0 auto;">
        Leave your message and become part of the final million.
      </p>
    </div>

    <div style="background:#111;border:1px solid #222;border-radius:18px;padding:24px;margin-bottom:24px;box-shadow:0 10px 30px rgba(0,0,0,0.25);">
      <textarea
        id="message"
        style="width:100%;height:140px;padding:16px;border-radius:12px;border:1px solid #2a2a2a;background:#0d0d0d;color:white;font-size:18px;box-sizing:border-box;resize:none;"
        placeholder="Write your final message..."
      ></textarea>

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:18px;">
        <button id="saveBtn" style="padding:12px 22px;font-size:16px;border:none;border-radius:12px;background:white;color:black;cursor:pointer;font-weight:600;">
          Save my message
        </button>

        <button id="randomBtn" style="padding:12px 22px;font-size:16px;border:1px solid #333;border-radius:12px;background:#151515;color:white;cursor:pointer;">
          Show random message
        </button>
      </div>

      <p id="status" style="margin-top:18px;white-space:pre-wrap;text-align:center;color:#bcbcbc;"></p>
      <p id="counter" style="margin-top:12px;font-size:18px;text-align:center;color:#ffffff;"></p>
    </div>

    <div id="latestSaved" style="margin-top:30px;"></div>

    <div id="messages" style="margin-top:44px;"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://fbfjptggmqzfvtijvdry.supabase.co';
    const supabaseKey = 'sb_publishable_0z7GiOROGpKo3XIIfMmVew_QhoQqKDV';

    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    const saveBtn = document.getElementById('saveBtn');
    const randomBtn = document.getElementById('randomBtn');
    const messagesEl = document.getElementById('messages');
    const counterEl = document.getElementById('counter');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function showLatestSavedMessage(msg) {
      const box = document.getElementById('latestSaved');

      box.innerHTML = `
        <div style="border:1px solid #2a2a2a;padding:22px;border-radius:18px;background:#111;text-align:left;box-shadow:0 10px 30px rgba(0,0,0,0.25);">
          <div style="font-size:13px;letter-spacing:1px;color:#8e8e8e;text-transform:uppercase;margin-bottom:10px;">Your message is live</div>
          <div style="font-size:28px;font-weight:700;margin-bottom:12px;">Message #${msg.id}</div>
          <div style="font-size:22px;line-height:1.5;margin-bottom:18px;">"${escapeHtml(msg.message)}"</div>
          <button id="shareLatestBtn" style="padding:12px 18px;font-size:15px;border:none;border-radius:12px;background:white;color:black;cursor:pointer;font-weight:600;">
            Copy & Share Your Message
          </button>
        </div>
      `;

      document.getElementById('shareLatestBtn').addEventListener('click', async () => {
        const shareText = `My message before the world ends (#${msg.id}): "${msg.message}" - lastmillionmessages.com`;

        try {
          await navigator.clipboard.writeText(shareText);
          alert('Copied! Share it 🔥');
        } catch {
          alert(shareText);
        }
      });
    }

    let client = null;

    try {
      client = window.supabase.createClient(supabaseUrl, supabaseKey);
      setStatus('App loaded.');
    } catch (e) {
      setStatus('Init error: ' + e.message);
    }

    async function loadMessages() {
      const { data, error } = await client
        .from('messages')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(12);

      if (error) {
        setStatus('Load error: ' + error.message);
        return;
      }

      messagesEl.innerHTML = `
        <div style="font-size:14px;letter-spacing:2px;color:#888;text-transform:uppercase;margin-bottom:10px;text-align:center;">
          Latest messages
        </div>
      `;

      if (!data || data.length === 0) {
        messagesEl.innerHTML += `
          <div style="background:#111;border:1px solid #222;border-radius:16px;padding:20px;text-align:center;color:#bdbdbd;">
            No messages yet.
          </div>
        `;
        return;
      }

      data.forEach((msg) => {
        const card = document.createElement('div');
        card.style.border = '1px solid #222';
        card.style.padding = '18px';
        card.style.marginBottom = '14px';
        card.style.borderRadius = '16px';
        card.style.background = '#111';
        card.style.textAlign = 'left';
        card.style.boxShadow = '0 8px 24px rgba(0,0,0,0.18)';

        card.innerHTML = `
          <div style="font-size:13px;color:#8f8f8f;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Message #${msg.id}</div>
          <div style="font-size:22px;line-height:1.5;margin-bottom:14px;">"${escapeHtml(msg.message)}"</div>
          <button class="share-btn" data-id="${msg.id}" data-message="${escapeHtml(msg.message)}" style="padding:10px 15px;font-size:14px;border:none;border-radius:10px;background:#fff;color:#000;cursor:pointer;font-weight:600;">
            Copy & Share
          </button>
        `;

        messagesEl.appendChild(card);
      });

      document.querySelectorAll('.share-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const text = btn.dataset.message
            .replace(/&quot;/g, '"')
            .replace(/&#039;/g, "'")
            .replace(/&lt;/g, '<')
            .replace(/&gt;/g, '>')
            .replace(/&amp;/g, '&');

          const shareText = `My message before the world ends (#${id}): "${text}" - lastmillionmessages.com`;

          try {
            await navigator.clipboard.writeText(shareText);
            alert('Copied! Share it 🔥');
          } catch {
            alert(shareText);
          }
        });
      });
    }

    async function loadCounter() {
      const { count, error } = await client
        .from('messages')
        .select('*', { count: 'exact', head: true });

      if (error) {
        setStatus('Counter error: ' + error.message);
        return;
      }

      counterEl.textContent = count + ' / 1,000,000 messages';
    }

    async function showRandomMessage() {
      const { data, error } = await client
        .from('messages')
        .select('*');

      if (error) {
        setStatus('Random error: ' + error.message);
        return;
      }

      if (data.length === 0) {
        alert('No messages yet.');
        return;
      }

      const random = data[Math.floor(Math.random() * data.length)];
      alert('Message #' + random.id + ':\n\n' + random.message);
    }

    saveBtn.addEventListener('click', async () => {
      const message = messageEl.value.trim();

      if (!message) {
        setStatus('Write something.');
        return;
      }

      setStatus('Saving...');

      const { data, error } = await client
        .from('messages')
        .insert([{ message }])
        .select()
        .single();

      if (error) {
        setStatus(error.message);
        return;
      }

      setStatus('Message saved!');
      messageEl.value = '';

      showLatestSavedMessage(data);
      loadMessages();
      loadCounter();
    });

    randomBtn.addEventListener('click', showRandomMessage);

    loadMessages();
    loadCounter();
  </script>
</body>
</html>
